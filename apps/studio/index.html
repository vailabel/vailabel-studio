<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/public/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vailabel Studio</title>
    <style>
      /* Dark base so the very first paint isn't a white flash while the JS
         bundle downloads + React mounts. Matches the app's default dark theme. */
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #0b0b0c;
        transition: opacity 0.3s ease;
      }
      #boot-splash.boot-hide {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .boot-ring {
        width: 38px;
        height: 38px;
        border: 3px solid rgba(255, 255, 255, 0.12);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      #boot-splash .boot-name {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: #fafafa;
      }
      #boot-splash .boot-status {
        font-size: 12.5px;
        color: #8a8a8a;
        min-height: 16px;
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash .boot-ring {
          animation-duration: 2s;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-splash" role="status" aria-live="polite">
      <div class="boot-ring"></div>
      <div class="boot-name">Vailabel Studio</div>
      <div class="boot-status" id="boot-status">Starting…</div>
    </div>
    <script>
      // Boot timeline: instrument startup so a slow cold-start is visible.
      // `window.__boot(msg)` stamps an elapsed-ms entry, updates the splash
      // status line, and mirrors to the console; `__bootDone()` prints the
      // full timeline; `removeSplash()` fades the splash out once React is up.
      (function () {
        window.__bootStart = performance.now();
        window.__bootLog = [];
        window.__boot = function (msg) {
          var t = Math.round(performance.now() - window.__bootStart);
          window.__bootLog.push({ t: t, msg: msg });
          var s = document.getElementById("boot-status");
          if (s) s.textContent = msg;
          if (window.console) console.info("[boot +" + t + "ms] " + msg);
        };
        window.__bootDone = function () {
          var t = Math.round(performance.now() - window.__bootStart);
          if (window.console)
            console.info("[boot] interface ready in " + t + "ms", window.__bootLog);
        };
        window.removeSplash = function () {
          var el = document.getElementById("boot-splash");
          if (!el) return;
          el.classList.add("boot-hide");
          setTimeout(function () {
            if (el && el.parentNode) el.parentNode.removeChild(el);
          }, 320);
        };
        window.__boot("loading interface…");
        // Failsafe: if React never mounts (boot crash), don't trap the user
        // behind a fake-loading screen — reveal whatever's underneath.
        setTimeout(function () {
          if (window.removeSplash) window.removeSplash();
        }, 12000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
