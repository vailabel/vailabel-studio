[package]
name = "vailabel-studio"
version = "1.0.11"
description = "Vailabel Studio Desktop"
authors = ["Vichea Nath <nathvichea1@gmail.com>"]
edition = "2021"

[lib]
name = "vailabel_studio_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
keyring = { version = "3", default-features = false, features = ["apple-native", "linux-native", "windows-native"] }
open = "5"
rfd = "0.15"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
thiserror = "2"
uuid = { version = "1", features = ["v4", "serde"] }
