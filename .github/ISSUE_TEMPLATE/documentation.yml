name: 📝 Documentation
description: Report missing, unclear, or incorrect documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Found something wrong or missing in the docs, README, or in-app help? Let us know.

  - type: textarea
    id: problem
    attributes:
      label: What's the documentation issue?
      description: What is missing, wrong, or confusing?
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: URL or file path of the docs in question.
      placeholder: "README.md / CONTRIBUTE.md / docs site URL"
    validations:
      required: false

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: How would you fix or improve it?
    validations:
      required: false
